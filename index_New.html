<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{width:100%;max-width:480px}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.07)}
.card-header{background:#131c30;padding:2rem 2rem 1.75rem}
.step{font-size:11px;font-weight:600;color:#4d8bf5;letter-spacing:.08em;margin-bottom:.75rem}
.card-header h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.4}
.card-header p{font-size:13px;color:#8fa3c8;line-height:1.6}
.card-body{padding:1.75rem 2rem 2rem}
.question{font-size:14px;font-weight:600;color:#131c30;margin-bottom:1.25rem}
.btns{display:flex;flex-direction:column;gap:10px}
.btn{display:block;text-decoration:none;border-radius:10px;padding:14px 18px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:#3674f5;color:#fff}
.btn-primary:hover{background:#2560e0;box-shadow:0 4px 14px rgba(54,116,245,.3)}
.btn-secondary{background:#f0f2f7;color:#131c30;border:1.5px solid #e4e8f0}
.btn-secondary:hover{border-color:#3674f5;color:#3674f5;background:#f5f7ff}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0}
.divider span{font-size:12px;color:#b0b8cc}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eaedf4}
.hint{margin-top:1.25rem;font-size:12px;color:#aab2c8;text-align:center;line-height:1.5}
</style>

<div class="wrap">
  <div class="card">
    <div class="card-header">
      <div class="step">신규 신청</div>
      <h1>어떤 서비스를 사용 중이신가요?</h1>
      <p>서비스에 맞는 계약 신청 폼으로 안내해 드립니다.</p>
    </div>
    <div class="card-body">
      <div class="question">사용 중인 서비스를 선택해 주세요</div>
      <div class="btns">
        <a class="btn btn-primary" href="https://new-form-project-ea0bac.zapier.app/lbox-form-new">엘박스 신청하기 →</a>
        <div class="divider"><span>또는</span></div>
        <a class="btn btn-secondary" href="https://new-form-project-ea0bac.zapier.app/casenote-form-new">케이스노트 신청하기 →</a>
      </div>
      <div class="hint">버튼을 클릭하면 해당 서비스의<br>신청 폼으로 이동합니다</div>
    </div>
  </div>
</div>
